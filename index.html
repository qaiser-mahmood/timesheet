<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Payroll Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 pb-24">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6 space-y-6">
        <h1 class="text-2xl font-bold text-gray-800 border-b pb-2 text-center">Staff Payroll Tracker</h1>
        
        <form id="payForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Date</label>
                <input type="date" id="date" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Staff Member</label>
                <select id="staffName" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                    <option>Adhiraj</option>
                    <option>Aayush</option>
                    <option>Manisha</option>
                    <option>Sumina</option>
                    <option>Rekha</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Hourly Pay Rate ($)</label>
                <input type="number" id="payRate" step="0.01" value="25.00" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Total Hours</label>
                    <input type="number" id="totalHours" step="0.1" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Paid in Cash Hours</label>
                    <input type="number" id="cashHours" step="0.1" value="0" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md font-semibold hover:bg-blue-700 transition">Add Entry</button>
        </form>

        <hr>

        <div>
            <h2 class="text-lg font-semibold text-gray-700 mb-2">Weekly Summary</h2>
            <div class="flex gap-2 mb-4">
                <input type="date" id="filterWeek" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm">
                <button onclick="filterByWeek()" class="bg-gray-800 text-white px-4 py-2 rounded-md text-sm">Filter</button>
                <button onclick="clearFilter()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md text-sm">Clear</button>
            </div>
            <div id="summaryView" class="space-y-2 bg-gray-50 p-3 rounded-md text-sm border"></div>
        </div>

        <div class="pt-2">
            <button onclick="exportUpdatedHtml()" class="w-full bg-green-600 text-white p-3 rounded-md font-bold hover:bg-green-700 transition shadow">
                💾 Save & Export Webpage
            </button>
            <p class="text-xs text-center text-gray-500 mt-2">Downloads an updated index.html to upload to GitHub.</p>
        </div>
    </div>

    <script id="payrollData" type="application/json">[]</script>

    <script>
        // Set default date picker to today
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        
        // Load embedded data safely
        let dataStore = [];
        try {
            dataStore = JSON.parse(document.getElementById('payrollData').textContent);
        } catch (e) { console.error("Error loading payroll dataset.", e); }

        // Process Form Submission
        document.getElementById('payForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const total = parseFloat(document.getElementById('totalHours').value);
            const cash = parseFloat(document.getElementById('cashHours').value);
            const paidHours = Math.max(0, total - cash);
            const rate = parseFloat(document.getElementById('payRate').value);

            const newEntry = {
                date: document.getElementById('date').value,
                name: document.getElementById('staffName').value,
                rate: rate,
                totalHours: total,
                cashHours: cash,
                paidHours: paidHours,
                calculatedPay: paidHours * rate
            };

            dataStore.push(newEntry);
            alert(`Added record for ${newEntry.name}! Click 'Save & Export Webpage' when you are done adding records.`);
            calculateWeeklyPayroll();
            this.reset();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            document.getElementById('payRate').value = rate; 
        });

        // Helper to find start of the week (Monday)
        function getMonday(d) {
            d = new Date(d);
            let day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1);
            return new Date(d.setDate(diff)).toISOString().split('T')[0];
        }

        // Aggregate data into a clean text display
        function calculateWeeklyPayroll(targetWeekStart = null) {
            const summaryDiv = document.getElementById('summaryView');
            if (dataStore.length === 0) {
                summaryDiv.innerHTML = '<p class="text-gray-500 italic text-center">No hours logged yet.</p>';
                return;
            }

            let filtered = dataStore;
            if (targetWeekStart) {
                filtered = dataStore.filter(entry => getMonday(entry.date) === targetWeekStart);
            }

            // Group metrics by staff name
            const staffTotals = {};
            filtered.forEach(entry => {
                if (!staffTotals[entry.name]) {
                    staffTotals[entry.name] = { total: 0, cash: 0, paid: 0, earnings: 0 };
                }
                staffTotals[entry.name].total += entry.totalHours;
                staffTotals[entry.name].cash += entry.cashHours;
                staffTotals[entry.name].paid += entry.paidHours;
                staffTotals[entry.name].earnings += entry.calculatedPay;
            });

            let html = targetWeekStart ? `<div class="font-bold text-blue-600 mb-2 text-xs">Showing week starting: ${targetWeekStart}</div>` : `<div class="font-bold text-gray-600 mb-2 text-xs">Showing ALL recorded history:</div>`;
            
            for (const [name, stats] of Object.entries(staffTotals)) {
                html += `
                    <div class="border-b pb-2 mb-2 last:border-0 last:mb-0">
                        <div class="font-semibold text-gray-800">${name}</div>
                        <div class="grid grid-cols-2 text-xs text-gray-600">
                            <div>Total Hours: <strong>${stats.total.toFixed(1)}h</strong></div>
                            <div>Paid Hours: <strong>${stats.paid.toFixed(1)}h</strong></div>
                            <div>Cash Hours: <strong>${stats.cash.toFixed(1)}h</strong></div>
                            <div class="text-green-700 font-semibold">Est. Pay: $${stats.earnings.toFixed(2)}</div>
                        </div>
                    </div>`;
            }
            summaryDiv.innerHTML = html;
        }

        function filterByWeek() {
            const val = document.getElementById('filterWeek').value;
            if (!val) return;
            calculateWeeklyPayroll(getMonday(val));
        }

        function clearFilter() {
            document.getElementById('filterWeek').value = '';
            calculateWeeklyPayroll();
        }

        // Self-Modifying HTML Engine: injects data array into its own script tag
        function exportUpdatedHtml() {
            const currentDoc = document.documentElement.outerHTML;
            const parser = new DOMParser();
            const doc = parser.parseFromString(currentDoc, 'text/html');
            
            // Overwrite JSON storage tag cleanly
            doc.getElementById('payrollData').textContent = JSON.stringify(dataStore);
            
            const updatedHtmlStr = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
            const blob = new Blob([updatedHtmlStr], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'index.html';
            a.click();
        }

        // Init layout on load
        calculateWeeklyPayroll();
    </script>
</body>
</html>

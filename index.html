<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatolya Kebabs Weekly Roster</title>
    <!-- Tailwind CSS for clean styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-2 sm:p-3 pb-24">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md p-3 sm:p-5 space-y-5 overflow-hidden">
        <h1 class="text-lg sm:text-xl font-bold text-gray-800 border-b pb-3 text-center">Anatolya Kebabs Weekly Roster</h1>
        
        <!-- Entry Form -->
        <form id="payForm" class="space-y-4 max-w-full">
            <!-- Row 1: Staff Selector & Calendar -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="w-full">
                    <label class="block text-xs font-bold text-gray-700 uppercase">Staff Member</label>
                    <select id="staffName" onchange="applyStaffRateDefaults()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2.5 border bg-white focus:ring-blue-500 focus:border-blue-500 text-xs">
                        <option>Adhiraj</option>
                        <option>Aayush</option>
                        <option>Manisha</option>
                        <option>Sumina</option>
                        <option>Rekha</option>
                    </select>
                </div>
                <div class="w-full">
                    <label class="block text-xs font-bold text-gray-700 uppercase">Date</label>
                    <input type="date" id="date" required onchange="applyDefaultShiftTimes()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2.5 border focus:ring-blue-500 focus:border-blue-500 text-xs max-w-full">
                </div>
            </div>

            <!-- Row 2: From & To Time -->
            <div class="flex flex-row space-x-4 w-full">
                <div class="flex-1">
                    <label class="block text-xs font-bold text-gray-700 uppercase">From</label>
                    <input type="time" id="startTime" required onchange="calculateHoursFromTime()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2.5 border bg-white focus:ring-blue-500 focus:border-blue-500 text-xs min-h-[44px]">
                </div>
                <div class="flex-1">
                    <label class="block text-xs font-bold text-gray-700 uppercase">To</label>
                    <input type="time" id="endTime" required onchange="calculateHoursFromTime()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2.5 border bg-white focus:ring-blue-500 focus:border-blue-500 text-xs min-h-[44px]">
                </div>
            </div>

            <!-- Row 3: Total & Cash Hours -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Total Hours</label>
                    <input type="number" id="totalHours" step="0.1" readonly class="mt-1 block w-full bg-gray-100 rounded-md border-gray-300 p-2.5 border font-semibold text-gray-700 text-xs shadow-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Paid in Cash Hours</label>
                    <input type="number" id="cashHours" step="0.1" placeholder="Leave blank if 0" class="mt-1 block w-full rounded-md border-gray-300 p-2.5 border focus:ring-blue-500 focus:border-blue-500 text-xs shadow-sm">
                </div>
            </div>

            <!-- Row 4: Cash & Tax Pay Rate -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Cash Rate</label>
                    <input type="number" id="payRate" step="0.01" value="25.00" required class="mt-1 block w-full rounded-md border-gray-300 p-2.5 border focus:ring-blue-500 focus:border-blue-500 text-xs shadow-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Tax Rate</label>
                    <input type="number" id="taxPayRate" step="0.01" value="30.00" required class="mt-1 block w-full rounded-md border-gray-300 p-2.5 border focus:ring-blue-500 focus:border-blue-500 text-xs shadow-sm">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white p-3 rounded-md font-semibold hover:bg-blue-700 transition text-xs shadow-sm flex items-center justify-center">Log Shift</button>
        </form>

        <hr class="border-gray-300 my-3">

        <!-- Weekly Master Roster Component -->
        <div class="space-y-3">
            <div class="flex flex-row items-center justify-between gap-2 border-l-4 border-gray-800 pl-2">
                <h2 class="text-xs font-bold text-gray-700 uppercase tracking-wide">Anatolya Kebabs Summary</h2>
                <div class="flex items-center gap-1.5">
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Week:</label>
                    <input type="date" id="filterWeek" onchange="renderWeeklyTable()" class="rounded-md border-gray-300 p-1 border text-xs bg-white">
                </div>
            </div>

            <!-- Date Range Header Display -->
            <div class="text-center bg-blue-50 border border-blue-100 py-1 px-2.5 rounded-md flex justify-between items-center text-[11px]">
                <span id="weekRangeDisplay" class="font-bold text-blue-950">-</span>
                <span class="bg-blue-600 text-white font-extrabold px-1.5 py-0.5 rounded text-[10px]">Pool: <span id="grandTotalHoursHeader">0.0</span>h</span>
            </div>
            
            <!-- Master Horizontal Roster Grid -->
            <div class="overflow-x-auto border border-gray-200 rounded-lg shadow-sm bg-white">
                <table class="min-w-full divide-y divide-gray-200 text-[10px] table-fixed">
                    <thead class="bg-gray-800 text-white">
                        <tr>
                            <th class="w-16 px-1 py-1.5 text-left font-bold tracking-tight">Staff</th>
                            <th class="w-10 text-center font-normal">Mon</th>
                            <th class="w-10 text-center font-normal">Tue</th>
                            <th class="w-10 text-center font-normal">Wed</th>
                            <th class="w-10 text-center font-normal">Thu</th>
                            <th class="w-10 text-center font-normal">Fri</th>
                            <th class="w-10 text-center font-normal">Sat</th>
                            <th class="w-10 text-center font-normal">Sun</th>
                            <th class="w-10 text-center font-bold bg-amber-900/60">Cash H</th>
                            <th class="w-10 text-center font-bold bg-blue-900/60">Tax H</th>
                            <th class="w-12 text-right pr-1 font-bold bg-slate-700">Cash</th>
                            <th class="w-12 text-right pr-1 font-bold bg-slate-700">Tax</th>
                        </tr>
                    </thead>
                    <tbody id="weeklyTableBody" class="divide-y divide-gray-200 bg-white">
                        <!-- Dynamic spreadsheet injection -->
                    </tbody>
                    <tfoot class="bg-gray-100 font-bold divide-y divide-gray-200 text-[9px]">
                        <tr id="weeklyTableFoot">
                            <!-- Daily Column Totals injected here -->
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <!-- App Engine Script -->
    <script>
        // Connected to your customized Google Sheet Web App Link
        const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbybwGgrqyvxbHI6lrjAzz1kxMTZi3rcUVSEYV-SqQtWtmUgRPkFtjtsU20C2EMY8EDKjg/exec";
        const ESTIMATED_TAX_RATE = 0.15; 

        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('date').value = todayStr;
        document.getElementById('filterWeek').value = todayStr;
        
        let dataStore = [];

        async function loadCloudData() {
            try {
                const res = await fetch(SHEET_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "get" })
                });
                const fetchedData = await res.json();
                if (Array.isArray(fetchedData)) {
                    dataStore = fetchedData;
                }
            } catch (e) { 
                console.error("Connection down. Operating in offline display mode.", e); 
            }
            renderWeeklyTable();
        }

        function applyStaffRateDefaults() {
            const name = document.getElementById('staffName').value;
            let cashRate = "25.00"; 
            let taxRate = "30.00";
            if (name === "Sumina" || name === "Rekha") {
                cashRate = "22.00";
                taxRate = "27.00";
            }
            document.getElementById('payRate').value = cashRate;
            document.getElementById('taxPayRate').value = taxRate;
        }

        function applyDefaultShiftTimes() {
            const dateInput = document.getElementById('date').value;
            if (!dateInput) return;
            const [year, month, day] = dateInput.split('-').map(Number);
            const dayOfWeek = new Date(year, month - 1, day).getDay(); 

            let defaultStart = "09:30";
            let defaultEnd = "17:00";
            if (dayOfWeek === 6) defaultStart = "09:00";
            if (dayOfWeek === 4) defaultEnd = "19:00";

            document.getElementById('startTime').value = defaultStart;
            document.getElementById('endTime').value = defaultEnd;
            calculateHoursFromTime();
        }

        function calculateHoursFromTime() {
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            if (!start || !end) return;
            const [startH, startM] = start.split(':').map(Number);
            const [endH, endM] = end.split(':').map(Number);
            let diffMinutes = (endH * 60 + endM) - (startH * 60 + startM);
            if (diffMinutes < 0) diffMinutes += 24 * 60;
            document.getElementById('totalHours').value = (diffMinutes / 60).toFixed(1);
        }

        function getMondayObj(dateString) {
            let d = new Date(dateString);
            let day = d.getDay();
            let diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function formatDisplayDate(dateObj) {
            return dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Form Submission Cloud Connector
        document.getElementById('payForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const total = parseFloat(document.getElementById('totalHours').value);
            let cash = document.getElementById('cashHours').value === "" ? 0 : parseFloat(document.getElementById('cashHours').value);
            
            if (isNaN(total)) return;
            if (cash > total) return alert("Cash component bounds check failed.");

            const taxHours = Math.max(0, total - cash);
            const chosenDate = document.getElementById('date').value;
            const targetMonday = getMondayObj(chosenDate).toISOString().split('T')[0];
            const currentStaff = document.getElementById('staffName').value;

            const newEntry = {
                date: chosenDate,
                weekCommencing: targetMonday,
                name: currentStaff,
                from: document.getElementById('startTime').value,
                to: document.getElementById('endTime').value,
                cashRate: parseFloat(document.getElementById('payRate').value),
                taxRate: parseFloat(document.getElementById('taxPayRate').value),
                totalHours: total,
                cashHours: cash,
                taxHours: taxHours
            };

            // Optimistically update the UI grid frame instantly so layout remains interactive
            const existingIndex = dataStore.findIndex(entry => entry.date === chosenDate && entry.name === currentStaff);
            if (existingIndex !== -1) { dataStore[existingIndex] = newEntry; } else { dataStore.push(newEntry); }
            
            renderWeeklyTable();
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Syncing with Sheet...";
            btn.disabled = true;

            // Safe submission using alternative content configuration rules
            try {
                await fetch(SHEET_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "save", entry: newEntry }),
                    redirect: "follow"
                });
            } catch (err) { 
                console.error("Cloud synchronization framework error:", err); 
            }

            btn.innerText = "Log Shift";
            btn.disabled = false;

            applyDefaultShiftTimes();
            document.getElementById('cashHours').value = '';
        });

        function renderWeeklyTable() {
            const filterWeekVal = document.getElementById('filterWeek').value;
            const tableBody = document.getElementById('weeklyTableBody');
            const tableFoot = document.getElementById('weeklyTableFoot');
            
            if (!filterWeekVal) return;

            const startMonday = getMondayObj(filterWeekVal);
            let endSunday = new Date(startMonday);
            endSunday.setDate(startMonday.getDate() + 6);
            document.getElementById('weekRangeDisplay').innerText = `${formatDisplayDate(startMonday)} – ${formatDisplayDate(endSunday)}`;

            const mandatoryStaff = ['Adhiraj', 'Aayush', 'Manisha', 'Sumina', 'Rekha'];
            let globalDailyTotals = [0, 0, 0, 0, 0, 0, 0]; 
            let macroTotals = { cashH: 0, taxH: 0, cashPayout: 0, taxPayout: 0, globalHours: 0 };
            let tbodyHtml = '';

            mandatoryStaff.forEach(staffName => {
                let staffRowHtml = `<td class="px-1 py-1.5 font-bold text-gray-900 border-r bg-gray-50 max-w-[64px] truncate">${staffName}</td>`;
                let staffCashH = 0; let staffTaxH = 0; let staffCashPay = 0; let staffTaxPay = 0;

                for (let i = 0; i < 7; i++) {
                    let loopDay = new Date(startMonday);
                    loopDay.setDate(startMonday.getDate() + i);
                    const loopDayIsoStr = loopDay.toISOString().split('T')[0];

                    const record = dataStore.find(entry => entry.date === loopDayIsoStr && entry.name === staffName);

                    if (record) {
                        const convertTimeStr = (t) => {
                            let [h, m] = t.split(':').map(Number);
                            let ampm = h >= 12 ? 'p' : 'a'; h = h % 12 || 12;
                            return `${h}:${m.toString().padStart(2, '0')}${ampm}`;
                        };
                        staffRowHtml += `<td class="p-0.5 text-center text-[9px] text-gray-600 leading-none border-r">${convertTimeStr(record.from)}<br>${convertTimeStr(record.to)}</td>`;
                        staffCashH += Number(record.cashHours);
                        staffTaxH += Number(record.taxHours);
                        staffCashPay += (Number(record.cashHours) * Number(record.cashRate));
                        const grossBase = Number(record.taxHours) * Number(record.taxRate);
                        staffTaxPay += (grossBase * (1 - ESTIMATED_TAX_RATE)) * 1.12;
                        globalDailyTotals[i] += Number(record.totalHours);
                        macroTotals.globalHours += Number(record.totalHours);
                    } else {
                        staffRowHtml += `<td class="p-0.5 text-center text-gray-300 border-r">—</td>`;
                    }
                }

                macroTotals.cashH += staffCashH; macroTotals.taxH += staffTaxH;
                macroTotals.cashPayout += staffCashPay; macroTotals.taxPayout += staffTaxPay;

                staffRowHtml += `
                    <td class="text-center font-semibold bg-amber-50/70 text-amber-900 border-r">${staffCashH > 0 ? staffCashH.toFixed(1) : '—'}</td>
                    <td class="text-center font-semibold bg-blue-50/70 text-blue-900 border-r">${staffTaxH > 0 ? staffTaxH.toFixed(1) : '—'}</td>
                    <td class="text-right pr-1 font-semibold text-gray-800 bg-slate-50/30 border-r">${staffCashPay > 0 ? staffCashPay.toFixed(0) : '—'}</td>
                    <td class="text-right pr-1 font-semibold text-gray-800 bg-slate-50/30">${staffTaxPay > 0 ? staffTaxPay.toFixed(0) : '—'}</td>`;
                tbodyHtml += `<tr>${staffRowHtml}</tr>`;
            });

            tableBody.innerHTML = tbodyHtml;
            document.getElementById('grandTotalHoursHeader').innerText = macroTotals.globalHours.toFixed(1);

            let tfootHtml = `<td class="px-1 py-1.5 text-left bg-gray-200 text-gray-900 border-r uppercase text-[9px]">Totals</td>`;
            globalDailyTotals.forEach(dayTotal => { tfootHtml += `<td class="text-center text-gray-900 bg-gray-100 border-r">${dayTotal > 0 ? dayTotal.toFixed(1) : '—'}</td>`; });
            tfootHtml += `
                <td class="text-center bg-amber-100 text-amber-950 border-r">${macroTotals.cashH.toFixed(1)}</td>
                <td class="text-center bg-blue-100 text-blue-950 border-r">${macroTotals.taxH.toFixed(1)}</td>
                <td class="text-right pr-1 bg-slate-200 text-gray-900 border-r">${macroTotals.cashPayout.toFixed(0)}</td>
                <td class="text-right pr-1 bg-slate-200 text-gray-900">${macroTotals.taxPayout.toFixed(0)}</td>`;
            tableFoot.innerHTML = tfootHtml;
        }

        // Bootstrap actions
        applyStaffRateDefaults();
        applyDefaultShiftTimes();
        loadCloudData();
    </script>
</body>
</html>

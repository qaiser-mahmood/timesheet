<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatolya Kebabs Weekly Roster</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-2 sm:p-4 pb-24">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md p-4 sm:p-6 space-y-6">
        <h1 class="text-xl sm:text-2xl font-bold text-gray-800 border-b pb-4 text-center">Anatolya Kebabs Weekly Roster</h1>
        
        <form id="payForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Staff Member</label>
                    <select id="staffName" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border bg-white focus:ring-blue-500 focus:border-blue-500 text-sm">
                        <option>Adhiraj</option>
                        <option>Aayush</option>
                        <option>Manisha</option>
                        <option>Sumina</option>
                        <option>Rekha</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Date</label>
                    <input type="date" id="date" required onchange="applyDefaultShiftTimes()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 text-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 bg-gray-50 p-3 rounded-lg border border-gray-200">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">From</label>
                    <input type="time" id="startTime" required onchange="calculateHoursFromTime()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border bg-white focus:ring-blue-500 focus:border-blue-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">To</label>
                    <input type="time" id="endTime" required onchange="calculateHoursFromTime()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border bg-white focus:ring-blue-500 focus:border-blue-500 text-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Total Hours</label>
                    <input type="number" id="totalHours" step="0.1" readonly class="mt-1 block w-full bg-gray-100 rounded-md border-gray-300 p-2 border font-semibold text-gray-700 text-sm shadow-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Paid in Cash Hours</label>
                    <input type="number" id="cashHours" step="0.1" placeholder="Leave blank if 0" class="mt-1 block w-full rounded-md border-gray-300 p-2 border focus:ring-blue-500 focus:border-blue-500 text-sm shadow-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Cash Rate ($/h)</label>
                    <input type="number" id="payRate" step="0.01" value="25.00" required class="mt-1 block w-full rounded-md border-gray-300 p-2 border focus:ring-blue-500 focus:border-blue-500 text-sm shadow-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Tax Rate ($/h)</label>
                    <input type="number" id="taxPayRate" step="0.01" value="28.00" required class="mt-1 block w-full rounded-md border-gray-300 p-2 border focus:ring-blue-500 focus:border-blue-500 text-sm shadow-sm">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-2.5 rounded-md font-semibold hover:bg-blue-700 transition text-sm shadow-sm">Log Shift</button>
        </form>

        <hr class="border-gray-300 my-4">

        <div class="space-y-4">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 border-l-4 border-gray-800 pl-2">
                <h2 class="text-md font-bold text-gray-700 uppercase tracking-wide">Anatolya Kebabs Weekly Summary</h2>
                <div class="flex items-center gap-2">
                    <label class="text-xs font-bold text-gray-500 uppercase">Week:</label>
                    <input type="date" id="filterWeek" onchange="renderWeeklyTable()" class="rounded-md border-gray-300 p-1 border text-xs bg-white">
                </div>
            </div>

            <div class="text-center bg-blue-50 border border-blue-100 py-1.5 px-3 rounded-lg flex justify-between items-center text-xs">
                <span id="weekRangeDisplay" class="font-bold text-blue-950">-</span>
                <span class="bg-blue-600 text-white font-extrabold px-2 py-0.5 rounded">Total Pool: <span id="grandTotalHoursHeader">0.0</span>h</span>
            </div>
            
            <div class="overflow-x-auto border border-gray-200 rounded-xl shadow-sm bg-white">
                <table class="min-w-full divide-y divide-gray-200 text-xs table-fixed sm:table-auto">
                    <thead class="bg-gray-800 text-white">
                        <tr>
                            <th class="w-20 px-2 py-2.5 text-left font-bold tracking-wider">Staff</th>
                            <th class="w-12 text-center font-semibold">Mon</th>
                            <th class="w-12 text-center font-semibold">Tue</th>
                            <th class="w-12 text-center font-semibold">Wed</th>
                            <th class="w-12 text-center font-semibold">Thu</th>
                            <th class="w-12 text-center font-semibold">Fri</th>
                            <th class="w-12 text-center font-semibold">Sat</th>
                            <th class="w-12 text-center font-semibold">Sun</th>
                            <th class="w-12 text-center font-bold bg-amber-900/60">Cash H</th>
                            <th class="w-12 text-center font-bold bg-blue-900/60">Tax H</th>
                            <th class="w-16 text-right pr-2 font-bold bg-slate-700">Cash $</th>
                            <th class="w-16 text-right pr-2 font-bold bg-slate-700">Tax $</th>
                        </tr>
                    </thead>
                    <tbody id="weeklyTableBody" class="divide-y divide-gray-200 bg-white">
                        </tbody>
                    <tfoot class="bg-gray-100 font-bold divide-y divide-gray-200 text-[11px]">
                        <tr id="weeklyTableFoot">
                            </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <div class="pt-2">
            <button onclick="exportUpdatedHtml()" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold hover:bg-green-700 transition shadow">
                💾 Save & Export Webpage
            </button>
        </div>
    </div>

    <script id="payrollData" type="application/json">[]</script>

    <script>
        const ESTIMATED_TAX_RATE = 0.15; // Standard 15% system default proxy holding

        // Initialize core layout trackers
        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('date').value = todayStr;
        document.getElementById('filterWeek').value = todayStr;
        
        let dataStore = [];
        try {
            dataStore = JSON.parse(document.getElementById('payrollData').textContent);
        } catch (e) { console.error("Error loading structural dataset array.", e); }

        function applyDefaultShiftTimes() {
            const dateInput = document.getElementById('date').value;
            if (!dateInput) return;

            const [year, month, day] = dateInput.split('-').map(Number);
            const dayOfWeek = new Date(year, month - 1, day).getDay(); // 0=Sun, 4=Thu, 6=Sat

            let defaultStart = "09:30";
            let defaultEnd = "17:00";

            if (dayOfWeek === 6) defaultStart = "09:00";
            if (dayOfWeek === 4) defaultEnd = "19:00";

            document.getElementById('startTime').value = defaultStart;
            document.getElementById('endTime').value = defaultEnd;
            calculateHoursFromTime();
        }

        function calculateHoursFromTime() {
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            if (!start || !end) return;

            const [startH, startM] = start.split(':').map(Number);
            const [endH, endM] = end.split(':').map(Number);
            let diffMinutes = (endH * 60 + endM) - (startH * 60 + startM);
            
            if (diffMinutes < 0) diffMinutes += 24 * 60;
            document.getElementById('totalHours').value = (diffMinutes / 60).toFixed(1);
        }

        function getMondayObj(dateString) {
            let d = new Date(dateString);
            let day = d.getDay();
            let diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function formatDisplayDate(dateObj) {
            return dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Form Submission Logic
        document.getElementById('payForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const total = parseFloat(document.getElementById('totalHours').value);
            let cash = document.getElementById('cashHours').value === "" ? 0 : parseFloat(document.getElementById('cashHours').value);
            
            if (isNaN(total)) return alert("Please specify valid Shift Start/End frames.");
            if (cash > total) return alert("Cash component bounds check failed.");

            const taxHours = Math.max(0, total - cash);
            const chosenDate = document.getElementById('date').value;
            const targetMonday = getMondayObj(chosenDate).toISOString().split('T')[0];

            const newEntry = {
                date: chosenDate,
                weekCommencing: targetMonday,
                name: document.getElementById('staffName').value,
                from: document.getElementById('startTime').value,
                to: document.getElementById('endTime').value,
                cashRate: parseFloat(document.getElementById('payRate').value),
                taxRate: parseFloat(document.getElementById('taxPayRate').value),
                totalHours: total,
                cashHours: cash,
                taxHours: taxHours
            };

            dataStore.push(newEntry);
            document.getElementById('filterWeek').value = chosenDate;
            
            renderWeeklyTable();
            alert(`Shift successfully added for ${newEntry.name}!`);
            
            applyDefaultShiftTimes();
            document.getElementById('cashHours').value = '';
        });

        // Generate Master Summary Matrix Spreadsheet
        function renderWeeklyTable() {
            const filterWeekVal = document.getElementById('filterWeek').value;
            const tableBody = document.getElementById('weeklyTableBody');
            const tableFoot = document.getElementById('weeklyTableFoot');
            
            if (!filterWeekVal) return;

            const startMonday = getMondayObj(filterWeekVal);
            let endSunday = new Date(startMonday);
            endSunday.setDate(startMonday.getDate() + 6);
            document.getElementById('weekRangeDisplay').innerText = `${formatDisplayDate(startMonday)} – ${formatDisplayDate(endSunday)}`;

            const mandatoryStaff = ['Adhiraj', 'Aayush', 'Manisha', 'Sumina', 'Rekha'];
            
            // Storage mapping matrices array logic tracking daily metrics across 7 segments
            let globalDailyTotals = [0, 0, 0, 0, 0, 0, 0]; 
            let macroTotals = { cashH: 0, taxH: 0, cashPayout: 0, taxPayout: 0, globalHours: 0 };

            let tbodyHtml = '';

            mandatoryStaff.forEach(staffName => {
                let staffRowHtml = `<td class="px-2 py-3 font-bold text-gray-900 border-r bg-gray-50">${staffName}</td>`;
                
                let staffCashH = 0;
                let staffTaxH = 0;
                let staffCashPay = 0;
                let staffTaxPay = 0;

                // Loop through all 7 calendar indices
                for (let i = 0; i < 7; i++) {
                    let loopDay = new Date(startMonday);
                    loopDay.setDate(startMonday.getDate() + i);
                    const loopDayIsoStr = loopDay.toISOString().split('T')[0];

                    const record = dataStore.find(entry => entry.date === loopDayIsoStr && entry.name === staffName);

                    if (record) {
                        // Short form string for responsive space reduction on small displays (e.g. 09:30 -> 9:30a)
                        const convertTimeStr = (t) => {
                            let [h, m] = t.split(':').map(Number);
                            let ampm = h >= 12 ? 'p' : 'a';
                            h = h % 12 || 12;
                            return `${h}:${m.toString().padStart(2, '0')}${ampm}`;
                        };
                        
                        staffRowHtml += `<td class="p-1 text-center text-[10px] text-gray-700 leading-tight border-r">${convertTimeStr(record.from)}<br>${convertTimeStr(record.to)}</td>`;
                        
                        staffCashH += record.cashHours;
                        staffTaxH += record.taxHours;
                        staffCashPay += (record.cashHours * record.cashRate);
                        
                        const grossBase = record.taxHours * record.taxRate;
                        staffTaxPay += (grossBase * (1 - ESTIMATED_TAX_RATE)) * 1.12;

                        globalDailyTotals[i] += record.totalHours;
                        macroTotals.globalHours += record.totalHours;
                    } else {
                        staffRowHtml += `<td class="p-1 text-center text-gray-300 border-r">—</td>`;
                    }
                }

                macroTotals.cashH += staffCashH;
                macroTotals.taxH += staffTaxH;
                macroTotals.cashPayout += staffCashPay;
                macroTotals.taxPayout += staffTaxPay;

                // Append trailing metric arrays matching layout config request
                staffRowHtml += `
                    <td class="text-center font-bold bg-amber-50 text-amber-900 border-r">${staffCashH > 0 ? staffCashH.toFixed(1) : '—'}</td>
                    <td class="text-center font-bold bg-blue-50 text-blue-900 border-r">${staffTaxH > 0 ? staffTaxH.toFixed(1) : '—'}</td>
                    <td class="text-right pr-2 font-medium text-gray-900 bg-slate-50/50 border-r">${staffCashPay > 0 ? '$' + staffCashPay.toFixed(0) : '—'}</td>
                    <td class="text-right pr-2 font-medium text-gray-900 bg-slate-50/50">${staffTaxPay > 0 ? '$' + staffTaxPay.toFixed(0) : '—'}</td>`;

                tbodyHtml += `<tr>${staffRowHtml}</tr>`;
            });

            tableBody.innerHTML = tbodyHtml;
            document.getElementById('grandTotalHoursHeader').innerText = macroTotals.globalHours.toFixed(1);

            // Dynamically evaluate footer context summary row elements
            let tfootHtml = `<td class="px-2 py-2 text-left bg-gray-200 text-gray-900 border-r">TOTALS</td>`;
            globalDailyTotals.forEach(dayTotal => {
                tfootHtml += `<td class="text-center text-gray-900 bg-gray-100 border-r">${dayTotal > 0 ? dayTotal.toFixed(1) + 'h' : '—'}</td>`;
            });
            tfootHtml += `
                <td class="text-center bg-amber-100 text-amber-950 border-r">${macroTotals.cashH.toFixed(1)}h</td>
                <td class="text-center bg-blue-100 text-blue-950 border-r">${macroTotals.taxH.toFixed(1)}h</td>
                <td class="text-right pr-2 bg-slate-200 text-gray-900 border-r">$${macroTotals.cashPayout.toFixed(0)}</td>
                <td class="text-right pr-2 bg-slate-200 text-gray-900">$${macroTotals.taxPayout.toFixed(0)}</td>`;
            
            tableFoot.innerHTML = tfootHtml;
        }

        // File Exporter Data Injection Core
        function exportUpdatedHtml() {
            const currentDoc = document.documentElement.outerHTML;
            const parser = new DOMParser();
            const doc = parser.parseFromString(currentDoc, 'text/html');
            doc.getElementById('payrollData').textContent = JSON.stringify(dataStore);
            
            const updatedHtmlStr = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
            const blob = new Blob([updatedHtmlStr], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'index.html';
            a.click();
        }

        // Bootstrap environment states on layout startup
        applyDefaultShiftTimes();
        renderWeeklyTable();
    </script>
</body>
</html>
